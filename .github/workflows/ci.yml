name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Ubuntu 22.04 ships 3.10, 24.04 ships 3.12 — the agent must run on both.
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit tests
        run: python -m unittest discover -s tests -v

  integration:
    # Real LUKS2 volume on a loop device: enroll -> escrow -> reveal ->
    # decrypt with the org private key -> prove the recovered key opens the
    # volume -> rotate -> prove the old key is dead and the new one works.
    # No TPM on hosted runners, so the TPM bind is skipped (--no-tpm); the
    # clevis path needs swtpm/VM runners (roadmap).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create LUKS2 test volume
        run: |
          set -eux
          truncate -s 64M disk.img
          echo -n "original-passphrase" > pass.txt
          sudo cryptsetup luksFormat --type luks2 --batch-mode disk.img pass.txt
          LOOP=$(sudo losetup --find --show disk.img)
          echo "LOOP=$LOOP" >> "$GITHUB_ENV"

      - name: Generate org RSA keypair
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -out org_private.pem
          openssl pkey -in org_private.pem -pubout -out org_public.pem

      - name: Start escrow server
        run: |
          python3 server/luksmith_server.py --db ci.db --port 8443 \
            --admin-token ci-admin --enroll-secret ci-enroll &
          sleep 1
          curl -sf http://127.0.0.1:8443/healthz

      - name: Enroll (recovery key + escrow, no TPM)
        run: |
          set -eux
          sudo python3 agent/luksmith.py enroll \
            --server http://127.0.0.1:8443 \
            --org-pubkey "$PWD/org_public.pem" \
            --enroll-secret ci-enroll \
            --device "$LOOP" \
            --unlock-key-file "$PWD/pass.txt" \
            --no-tpm
          sudo python3 agent/luksmith.py status | tee status.json
          grep -q '"recovery_key_escrowed": true' status.json

      - name: Reveal, decrypt, and prove the escrowed key opens the volume
        run: |
          set -eux
          DEVICE_ID=$(curl -sf -H "Authorization: Bearer ci-admin" \
            http://127.0.0.1:8443/api/v1/devices | python3 -c \
            "import json,sys; print(json.load(sys.stdin)['devices'][0]['id'])")
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/reveal?reason=ci-e2e" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['ciphertext'])" \
            | base64 -d > key.enc
          openssl pkeyutl -decrypt -inkey org_private.pem \
            -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 \
            -in key.enc -out recovered.key
          sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered.key
          echo "E2E escrow chain verified"

      - name: Rotate and prove old key dead, new key live
        run: |
          set -eux
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/rotate"
          sudo python3 agent/luksmith.py rotate --unlock-key-file "$PWD/pass.txt"
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/reveal?reason=ci-rotate" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['ciphertext'])" \
            | base64 -d > key2.enc
          openssl pkeyutl -decrypt -inkey org_private.pem \
            -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 \
            -in key2.enc -out recovered2.key
          ! cmp -s recovered.key recovered2.key
          if sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered.key; then
            echo "old recovery key still works after rotation"; exit 1
          fi
          sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered2.key
          echo "rotation verified"

      - name: Verify (boot classification path)
        run: |
          sudo python3 agent/luksmith.py verify --no-regen | tee verify.json
          grep -q '"boot_class": "no_tpm_binding"' verify.json

  intune-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: shellcheck integrations/intune/luksmith-discovery.sh install.sh
      - name: Discovery script against fixture data
        run: |
          set -eux
          # No agent installed -> reports absent, non-compliant
          out=$(sh integrations/intune/luksmith-discovery.sh)
          echo "$out" | python3 -m json.tool
          echo "$out" | grep -q '"luksmith_present": false'
          # Healthy fixture -> compliant
          sudo mkdir -p /var/lib/luksmith
          echo '{"disk_encrypted": true, "tpm_bound": true, "recovery_key_escrowed": true, "last_boot_class": "tpm_unlock_ok"}' \
            | sudo tee /var/lib/luksmith/compliance.json
          out=$(sh integrations/intune/luksmith-discovery.sh)
          echo "$out" | python3 -m json.tool
          echo "$out" | grep -q '"recovery_key_escrowed": true'
          echo "$out" | grep -q '"boot_healthy": true'
          # Fallback boot -> unhealthy
          echo '{"disk_encrypted": true, "tpm_bound": true, "recovery_key_escrowed": true, "last_boot_class": "fallback_used"}' \
            | sudo tee /var/lib/luksmith/compliance.json
          sh integrations/intune/luksmith-discovery.sh | grep -q '"boot_healthy": false'

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and health-check server image
        run: |
          set -eux
          docker build -t luksmith-server ./server
          docker run -d --name lk -p 8443:8443 \
            -e LUKSMITH_ADMIN_TOKEN=t -e LUKSMITH_ENROLL_SECRET=s luksmith-server
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8443/healthz && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8443/healthz
          docker logs lk
