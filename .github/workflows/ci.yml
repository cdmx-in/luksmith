name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Unit tests
        run: python -m unittest discover -s tests -v

  integration:
    # Real LUKS2 volume on a loop device: enroll -> escrow -> reveal ->
    # decrypt with the org private key -> prove the recovered key opens the
    # volume. No TPM on hosted runners, so the TPM bind step is skipped
    # (--no-tpm); the clevis path needs self-hosted/VM runners (roadmap).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create LUKS2 test volume
        run: |
          set -eux
          truncate -s 64M disk.img
          echo -n "original-passphrase" > pass.txt
          sudo cryptsetup luksFormat --type luks2 --batch-mode disk.img pass.txt
          LOOP=$(sudo losetup --find --show disk.img)
          echo "LOOP=$LOOP" >> "$GITHUB_ENV"

      - name: Generate org RSA keypair
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -out org_private.pem
          openssl pkey -in org_private.pem -pubout -out org_public.pem

      - name: Start escrow server
        run: |
          python3 server/luksmith_server.py --db ci.db --port 8443 \
            --admin-token ci-admin --enroll-secret ci-enroll &
          sleep 1
          curl -sf http://127.0.0.1:8443/healthz

      - name: Enroll (recovery key + escrow, no TPM)
        run: |
          set -eux
          sudo python3 agent/luksmith.py enroll \
            --server http://127.0.0.1:8443 \
            --org-pubkey "$PWD/org_public.pem" \
            --enroll-secret ci-enroll \
            --device "$LOOP" \
            --unlock-key-file "$PWD/pass.txt" \
            --no-tpm
          sudo python3 agent/luksmith.py status | tee status.json
          grep -q '"recovery_key_escrowed": true' status.json

      - name: Reveal, decrypt, and prove the escrowed key opens the volume
        run: |
          set -eux
          DEVICE_ID=$(curl -sf -H "Authorization: Bearer ci-admin" \
            http://127.0.0.1:8443/api/v1/devices | python3 -c \
            "import json,sys; print(json.load(sys.stdin)['devices'][0]['id'])")
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/reveal?reason=ci-e2e" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['ciphertext'])" \
            | base64 -d > key.enc
          openssl pkeyutl -decrypt -inkey org_private.pem \
            -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 \
            -in key.enc -out recovered.key
          # The recovered recovery key must actually unlock the LUKS volume.
          sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered.key
          echo "E2E escrow chain verified"

      - name: Verify (boot classification path)
        run: |
          sudo python3 agent/luksmith.py verify --no-regen | tee verify.json
          grep -q '"boot_class": "no_tpm_binding"' verify.json

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Intune discovery script
        run: shellcheck integrations/intune/luksmith-discovery.sh
