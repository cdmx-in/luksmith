name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Ubuntu 22.04 ships 3.10, 24.04 ships 3.12 — the agent must run on both.
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Unit tests
        run: python -m unittest discover -s tests -v

  integration:
    # Real LUKS2 volume on a loop device: enroll -> escrow -> reveal ->
    # decrypt with the org private key -> prove the recovered key opens the
    # volume -> rotate -> prove the old key is dead and the new one works.
    # Runs against BOTH portal implementations to pin API parity.
    # No hardware TPM on hosted runners, so the TPM bind is skipped here
    # (--no-tpm); the real clevis TPM path runs in tpm-integration via swtpm.
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        server: [python, go]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: matrix.server == 'go'
        with:
          go-version-file: server-go/go.mod
          cache-dependency-path: server-go/go.sum

      - name: Create LUKS2 test volume
        run: |
          set -eux
          truncate -s 64M disk.img
          echo -n "original-passphrase" > pass.txt
          sudo cryptsetup luksFormat --type luks2 --batch-mode disk.img pass.txt
          LOOP=$(sudo losetup --find --show disk.img)
          echo "LOOP=$LOOP" >> "$GITHUB_ENV"

      - name: Generate org RSA keypair
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -out org_private.pem
          openssl pkey -in org_private.pem -pubout -out org_public.pem

      - name: Start escrow server (python)
        if: matrix.server == 'python'
        run: |
          python3 server/luksmith_server.py --db ci.db --port 8443 \
            --admin-token ci-admin --enroll-secret ci-enroll &
          sleep 1
          curl -sf http://127.0.0.1:8443/healthz

      - name: Start escrow server (go)
        if: matrix.server == 'go'
        run: |
          (cd server-go && go build -o /tmp/luksmith-server .)
          /tmp/luksmith-server --db ci.db --port 8443 \
            --admin-token ci-admin --enroll-secret ci-enroll &
          sleep 1
          curl -sf http://127.0.0.1:8443/healthz

      - name: Enroll (recovery key + escrow, no TPM)
        run: |
          set -eux
          sudo python3 agent/luksmith.py enroll \
            --server http://127.0.0.1:8443 \
            --org-pubkey "$PWD/org_public.pem" \
            --enroll-secret ci-enroll \
            --device "$LOOP" \
            --unlock-key-file "$PWD/pass.txt" \
            --no-tpm
          sudo python3 agent/luksmith.py status | tee status.json
          grep -q '"recovery_key_escrowed": true' status.json

      - name: Reveal, decrypt, and prove the escrowed key opens the volume
        run: |
          set -eux
          DEVICE_ID=$(curl -sf -H "Authorization: Bearer ci-admin" \
            http://127.0.0.1:8443/api/v1/devices | python3 -c \
            "import json,sys; print(json.load(sys.stdin)['devices'][0]['id'])")
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/reveal?reason=ci-e2e" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['ciphertext'])" \
            | base64 -d > key.enc
          openssl pkeyutl -decrypt -inkey org_private.pem \
            -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 \
            -in key.enc -out recovered.key
          sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered.key
          echo "E2E escrow chain verified"

      - name: Rotate and prove old key dead, new key live
        run: |
          set -eux
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/rotate"
          sudo python3 agent/luksmith.py rotate --unlock-key-file "$PWD/pass.txt"
          curl -sf -X POST -H "Authorization: Bearer ci-admin" \
            "http://127.0.0.1:8443/api/v1/keys/$DEVICE_ID/reveal?reason=ci-rotate" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['ciphertext'])" \
            | base64 -d > key2.enc
          openssl pkeyutl -decrypt -inkey org_private.pem \
            -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256 \
            -in key2.enc -out recovered2.key
          ! cmp -s recovered.key recovered2.key
          if sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered.key; then
            echo "old recovery key still works after rotation"; exit 1
          fi
          sudo cryptsetup open --test-passphrase "$LOOP" --key-file recovered2.key
          echo "rotation verified"

      - name: Verify (boot classification path)
        run: |
          sudo python3 agent/luksmith.py verify --no-regen | tee verify.json
          grep -q '"boot_class": "no_tpm_binding"' verify.json

  tpm-integration:
    # Full TPM lifecycle against a software TPM (swtpm): clevis enroll ->
    # verify tpm_unlock_ok -> extend PCR 7 (simulated firmware update) ->
    # verify detects drift and rebinds against the NEW PCR value -> verify
    # reports tpm_unlock_ok again.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install swtpm + clevis stack
        run: |
          sudo apt-get update
          sudo apt-get install -y swtpm clevis clevis-luks clevis-tpm2 tpm2-tools cryptsetup-bin

      - name: Start software TPM
        run: |
          set -eux
          mkdir -p /tmp/tpmstate
          swtpm socket --tpm2 --server port=2321 --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --tpmstate dir=/tmp/tpmstate &
          sleep 1
          export TPM2TOOLS_TCTI="swtpm:port=2321"
          tpm2_pcrread sha256:7
          echo 'TPM2TOOLS_TCTI=swtpm:port=2321' >> "$GITHUB_ENV"

      - name: Create LUKS2 test volume
        run: |
          set -eux
          truncate -s 64M disk.img
          echo -n "original-passphrase" > pass.txt
          sudo cryptsetup luksFormat --type luks2 --batch-mode disk.img pass.txt
          LOOP=$(sudo losetup --find --show disk.img)
          echo "LOOP=$LOOP" >> "$GITHUB_ENV"

      - name: Generate org RSA keypair
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 -out org_private.pem
          openssl pkey -in org_private.pem -pubout -out org_public.pem

      - name: Start escrow server
        run: |
          python3 server/luksmith_server.py --db ci.db --port 8443 \
            --admin-token ci-admin --enroll-secret ci-enroll &
          sleep 1
          curl -sf http://127.0.0.1:8443/healthz

      - name: Enroll with clevis TPM bind (sudo -E keeps TCTI)
        run: |
          set -eux
          sudo -E python3 agent/luksmith.py enroll \
            --server http://127.0.0.1:8443 \
            --org-pubkey "$PWD/org_public.pem" \
            --enroll-secret ci-enroll \
            --device "$LOOP" \
            --mode clevis --pcrs 7 \
            --unlock-key-file "$PWD/pass.txt" | tee enroll.json
          grep -q '"tpm_mode": "clevis"' enroll.json
          sudo -E clevis luks list -d "$LOOP" | tee clevis.txt
          grep -q 'tpm2' clevis.txt

      - name: Verify reports tpm_unlock_ok
        run: |
          set -eux
          sudo -E python3 agent/luksmith.py verify --no-regen | tee verify1.json
          grep -q '"boot_class": "tpm_unlock_ok"' verify1.json

      - name: Simulate PCR drift, prove detection + auto-rebind
        run: |
          set -eux
          tpm2_pcrextend 7:sha256=deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef
          sudo -E python3 agent/luksmith.py verify \
            --unlock-key-file "$PWD/pass.txt" | tee verify2.json
          grep -Eq '"boot_class": "fallback_used"|"pcr7_drift": true' verify2.json
          grep -q '"rebound": true' verify2.json

      - name: Verify clean again after rebind
        run: |
          set -eux
          sudo -E python3 agent/luksmith.py verify --no-regen | tee verify3.json
          grep -q '"boot_class": "tpm_unlock_ok"' verify3.json
          grep -q '"pcr7_drift": false' verify3.json

  intune-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck
        run: shellcheck integrations/intune/luksmith-discovery.sh install.sh
      - name: Discovery script against fixture data
        run: |
          set -eux
          # No agent installed -> reports absent, non-compliant
          out=$(sh integrations/intune/luksmith-discovery.sh)
          echo "$out" | python3 -m json.tool
          echo "$out" | grep -q '"luksmith_present": false'
          # Healthy fixture -> compliant
          sudo mkdir -p /var/lib/luksmith
          echo '{"disk_encrypted": true, "tpm_bound": true, "recovery_key_escrowed": true, "last_boot_class": "tpm_unlock_ok"}' \
            | sudo tee /var/lib/luksmith/compliance.json
          out=$(sh integrations/intune/luksmith-discovery.sh)
          echo "$out" | python3 -m json.tool
          echo "$out" | grep -q '"recovery_key_escrowed": true'
          echo "$out" | grep -q '"boot_healthy": true'
          # Fallback boot -> unhealthy
          echo '{"disk_encrypted": true, "tpm_bound": true, "recovery_key_escrowed": true, "last_boot_class": "fallback_used"}' \
            | sudo tee /var/lib/luksmith/compliance.json
          sh integrations/intune/luksmith-discovery.sh | grep -q '"boot_healthy": false'

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
        working-directory: ui
      - run: npm run build
        working-directory: ui
      - uses: actions/upload-artifact@v4
        with:
          name: luksmith-ui-dist
          path: ui/dist

  server-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod
          cache-dependency-path: server-go/go.sum
      - run: go vet ./...
      - run: gofmt -l . && test -z "$(gofmt -l .)"
      - run: go test ./...
      - name: static cross-compile check
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o /dev/null .

  rhel-unit:
    # Proves the agent imports and its unit tests pass on RHEL-family (Fedora),
    # pinning dnf/distro compatibility. Chosen over a fedora-container swtpm
    # lifecycle: the real TPM path needs a privileged container with loop
    # devices (losetup) which is fragile in CI — the host-runner tpm-integration
    # job already exercises the full swtpm enroll->verify->drift lifecycle, and
    # the agent's TPM code is distro-agnostic (mode defaults + dracut-vs-initramfs
    # is unit-tested here). Fedora 41 ships dracut, so the systemd native path
    # is the default on this family.
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - name: Install python3 + git
        run: dnf install -y python3 git
      - uses: actions/checkout@v4
      - name: Unit tests on Fedora
        run: python3 -m unittest discover -s tests -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and health-check server image
        run: |
          set -eux
          docker build -t luksmith-server ./server
          docker run -d --name lk -p 8443:8443 \
            -e LUKSMITH_ADMIN_TOKEN=t -e LUKSMITH_ENROLL_SECRET=s luksmith-server
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8443/healthz && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8443/healthz
          docker logs lk
